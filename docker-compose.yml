version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: seyon-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - seyon-network

  server:
    build: ./server
    container_name: seyon-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/seyon
      - JWT_SECRET=seyon_jwt_secret_9e60e813
      - JWT_REFRESH_SECRET=seyon_jwt_refresh_secret_9e60e813
      - NODE_ENV=production
    depends_on:
      - mongodb
    networks:
      - seyon-network

  client:
    build: ./client
    container_name: seyon-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - seyon-network

volumes:
  mongo_data:

networks:
  seyon-network:
    driver: bridge
